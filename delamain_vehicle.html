<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Деламейн — Транспорт</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Martian+Mono:wght@300;400;500&display=swap');

:root {
  --bg:       #09090a;
  --surface:  #0f0f11;
  --border:   #1e1e22;
  --border2:  #2a2a30;
  --text:     #b8b4c0;
  --dim:      #55525e;
  --accent:   #7eb8a4;
  --accent2:  #3d6e60;
  --warn:     #b87e7e;
  --warn2:    #6e3d3d;
  --gold:     #c4a86e;
  --gold2:    #6e5a30;
  --mono:     'Martian Mono', monospace;
  --display:  'Unbounded', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.8;
  font-weight: 300;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 32px 100px;
}

.header {
  margin-bottom: 48px;
  position: relative;
}

.header-sys {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-sys::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
  display: inline-block;
  margin-right: 4px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
  50%       { opacity: 0.4; box-shadow: 0 0 2px var(--accent); }
}

.nav-links {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--dim);
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 0.1em;
  border: 1px solid var(--border);
  padding: 8px 16px;
  background: var(--surface);
  transition: all 0.2s;
}

.nav-link:hover {
  border-color: var(--accent2);
  color: var(--accent);
}

.nav-link span {
  color: var(--accent2);
}

.title-block {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

h1 {
  font-family: var(--display);
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 200;
  letter-spacing: -0.02em;
  color: #e8e4f0;
}

h1 span {
  color: var(--accent);
  font-size: 0.6em;
  margin-right: 12px;
}

.vehicle-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 30px;
  margin-bottom: 30px;
  position: relative;
  overflow: hidden;
  border-left: 2px solid var(--accent2);
}

.vehicle-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.vehicle-image {
  display: flex;
  justify-content: center;
  margin-bottom: 30px;
}

.vehicle-image img {
  max-width: 100%;
  height: auto;
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 10px;
  image-rendering: pixelated;
}

.vehicle-specs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 30px;
  padding: 20px;
  background: rgba(0,0,0,0.2);
  border-radius: 3px;
}

.spec-item {
  text-align: center;
}

.spec-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dim);
  display: block;
  margin-bottom: 5px;
}

.spec-value {
  font-size: 14px;
  color: var(--accent);
  font-weight: 400;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 40px 0 16px;
}

.section-header h2 {
  font-family: var(--display);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-num {
  font-size: 9px;
  color: var(--border2);
  letter-spacing: 0.1em;
}

.description-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 22px;
  margin-bottom: 30px;
  border-left: 2px solid var(--gold2);
}

.description-card p {
  margin-bottom: 15px;
  font-size: 13px;
  line-height: 1.9;
}

.description-card p:last-child {
  margin-bottom: 0;
}

.items-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 30px;
}

.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 18px 20px;
  border-left: 2px solid var(--accent2);
}

.item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.item-name {
  font-size: 14px;
  font-weight: 400;
  color: #d4d0dc;
  letter-spacing: 0.02em;
}

.item-quantity {
  font-size: 12px;
  color: var(--accent);
  background: rgba(126,184,164,0.1);
  border: 1px solid var(--accent2);
  padding: 2px 8px;
  border-radius: 2px;
}

.item-desc {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
}

.vehicle-nav {
  display: flex;
  justify-content: space-between;
  margin: 20px 0;
  gap: 10px;
}

.vehicle-nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--dim);
  text-decoration: none;
  font-size: 11px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.vehicle-nav-btn:hover:not(.disabled) {
  border-color: var(--accent2);
  color: var(--accent);
}

.vehicle-nav-btn.disabled {
  opacity: 0.3;
  pointer-events: none;
}

.admin-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  color: var(--dim);
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 0.1em;
  z-index: 1001;
  transition: all 0.2s;
}

.admin-btn:hover {
  border-color: var(--accent2);
  color: var(--accent);
}

.footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
}

@media (max-width: 600px) {
  .page { padding: 30px 16px 60px; }
  .vehicle-specs { grid-template-columns: 1fr; }
  .items-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

  <div class="nav-links">
    <a href="index.html" class="nav-link"><span>←</span> К АНКЕТЕ</a>
    <a href="delamain_inventory.html" class="nav-link"><span>//</span> ИНВЕНТАРЬ</a>
    <a href="delamain_fleet.html" class="nav-link"><span>🚙</span> АВТОПАРК</a>
    <a href="delamain_home.html" class="nav-link"><span>🏠</span> ОФИС</a>
  </div>
    
    <div class="header-sys">
      <span class="status-dot"></span>
      личный транспорт // frodller_registry // доступ: открыт
    </div>
    
    <div class="title-block">
      <h1><span>//</span> <span id="vehicle-title">ТРАНСПОРТ</span></h1>
      <div style="font-size: 11px; color: var(--dim);" id="vehicle-subtitle">Деламейн // личное авто</div>
    </div>
  </div>

  <div id="vehicle-content"></div>
  <div id="vehicle-navigation" class="vehicle-nav"></div>

  <div class="footer">
    <span>DEL // ТРАНСПОРТ v1.0</span>
    <span>фродллер // обновление: <span id="update-date"></span></span>
  </div>

</div>

<a href="admin.html" class="admin-btn">⚙️ ADMIN</a>

<script>
function getVehicleIdFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('id') || 'v001'; // по умолчанию первая машина
}

async function loadVehicleData() {
  try {
    const vehicleId = getVehicleIdFromUrl();
    const response = await fetch('data_character.json?' + Date.now());
    const data = await response.json();
    
    const vehicle = data.fleet.vehicles.find(v => v.id === vehicleId);
    if (!vehicle) {
      window.location.href = 'delamain_fleet.html';
      return;
    }
    
    document.getElementById('update-date').textContent = data.last_updated || '12.03.2026';
    document.getElementById('vehicle-title').textContent = vehicle.name;
    document.getElementById('vehicle-subtitle').textContent = `${vehicle.make} ${vehicle.model} // ${vehicle.role}`;
    
    document.getElementById('vehicle-content').innerHTML = `
      <div class="vehicle-card">
        <div class="vehicle-image">
          <img src="${vehicle.image}" alt="${vehicle.name}" style="width: ${vehicle.image_size || 400}px; image-rendering: pixelated;" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'400\' height=\'200\' viewBox=\'0 0 400 200\'><rect width=\'400\' height=\'200\' fill=\'%233d6e60\'/><rect x=\'50\' y=\'50\' width=\'300\' height=\'100\' fill=\'%237eb8a4\'/><circle cx=\'100\' cy=\'150\' r=\'30\' fill=\'%23333\'/><circle cx=\'300\' cy=\'150\' r=\'30\' fill=\'%23333\'/></svg>'">
        </div>
        
        <div style="margin-bottom: 20px;">
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px; flex-wrap: wrap;">
            <span style="font-size: 22px; color: #d4d0dc; font-family: var(--display);">${vehicle.name}</span>
            <span class="badge badge-ai" style="font-size: 10px; padding: 4px 10px; background: rgba(126,184,164,0.1); border: 1px solid var(--accent2); color: var(--accent);">${vehicle.type}</span>
            <span class="badge ${vehicle.role === 'резервная' ? 'badge-warn' : 'badge-act'}" style="font-size: 10px; padding: 4px 10px;">${vehicle.role.toUpperCase()}</span>
          </div>
          <div style="color: var(--dim); font-size: 11px;">Владелец: Деламейн // статус: ${vehicle.status}</div>
        </div>
        
        <div class="vehicle-specs">
          <div class="spec-item">
            <span class="spec-label">Марка</span>
            <span class="spec-value">${vehicle.make}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Модель</span>
            <span class="spec-value">${vehicle.model}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Год</span>
            <span class="spec-value">${vehicle.year}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Двигатель</span>
            <span class="spec-value">${vehicle.engine}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Привод</span>
            <span class="spec-value">${vehicle.drivetrain}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Мощность</span>
            <span class="spec-value">${vehicle.power}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Разгон</span>
            <span class="spec-value">${vehicle.acceleration}</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Макс.</span>
            <span class="spec-value">${vehicle.topspeed}</span>
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">01</span>
        <h2>Описание</h2>
      </div>

      <div class="description-card">
        ${vehicle.description.map(p => `<p>${p}</p>`).join('')}
      </div>

      <div class="section-header">
        <span class="section-num">02</span>
        <h2>Что оставлено в машине</h2>
      </div>

      <div id="vehicleItemsContainer" class="items-grid">
        ${vehicle.items && vehicle.items.length > 0 
          ? vehicle.items.map(item => `
              <div class="item-card">
                <div class="item-header">
                  <div class="item-name">${item.name}</div>
                  <div class="item-quantity">${item.quantity}</div>
                </div>
                <div class="item-desc">${item.description}</div>
              </div>
            `).join('')
          : '<div class="item-card"><div class="item-desc">Пусто</div></div>'
        }
      </div>
    `;
    
    // Навигация между машинами
    const currentIndex = data.fleet.vehicles.findIndex(v => v.id === vehicleId);
    const prevVehicle = currentIndex > 0 ? data.fleet.vehicles[currentIndex - 1] : null;
    const nextVehicle = currentIndex < data.fleet.vehicles.length - 1 ? data.fleet.vehicles[currentIndex + 1] : null;
    
    document.getElementById('vehicle-navigation').innerHTML = `
      ${prevVehicle ? `<a href="delamain_vehicle.html?id=${prevVehicle.id}" class="vehicle-nav-btn"><span>←</span> ${prevVehicle.name}</a>` : '<div class="vehicle-nav-btn disabled"><span>←</span> Нет предыдущей</div>'}
      <a href="delamain_fleet.html" class="vehicle-nav-btn"><span>🚙</span> ВСЕ МАШИНЫ</a>
      ${nextVehicle ? `<a href="delamain_vehicle.html?id=${nextVehicle.id}" class="vehicle-nav-btn">${nextVehicle.name} <span>→</span></a>` : '<div class="vehicle-nav-btn disabled">Нет следующей <span>→</span></div>'}
    `;
    
  } catch (error) {
    console.error('Ошибка загрузки данных транспорта:', error);
  }
}

loadVehicleData();
</script>
</body>
</html>
