<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Деламейн — Инвентарь</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Martian+Mono:wght@300;400;500&display=swap');

:root {
  --bg:       #09090a;
  --surface:  #0f0f11;
  --border:   #1e1e22;
  --border2:  #2a2a30;
  --text:     #b8b4c0;
  --dim:      #55525e;
  --accent:   #7eb8a4;
  --accent2:  #3d6e60;
  --warn:     #b87e7e;
  --warn2:    #6e3d3d;
  --gold:     #c4a86e;
  --gold2:    #6e5a30;
  --mono:     'Martian Mono', monospace;
  --display:  'Unbounded', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.8;
  font-weight: 300;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 32px 100px;
}

.header {
  margin-bottom: 48px;
  position: relative;
}

.header-sys {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-sys::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
  display: inline-block;
  margin-right: 4px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
  50%       { opacity: 0.4; box-shadow: 0 0 2px var(--accent); }
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  color: var(--dim);
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 0.1em;
  border: 1px solid var(--border);
  padding: 8px 16px;
  background: var(--surface);
  transition: all 0.2s;
}

.back-link:hover {
  border-color: var(--accent2);
  color: var(--accent);
}

.back-link span {
  color: var(--accent2);
}

.title-block {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

h1 {
  font-family: var(--display);
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 200;
  letter-spacing: -0.02em;
  color: #e8e4f0;
}

h1 span {
  color: var(--accent);
  font-size: 0.6em;
  margin-right: 12px;
}

.stats-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 24px 28px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  border-left: 2px solid var(--accent2);
}

.stats-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 24px;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}

.stat-label::before {
  content: '//';
  color: var(--accent2);
  margin-right: 6px;
  font-size: 8px;
}

.stat-value {
  font-size: 20px;
  font-family: var(--display);
  font-weight: 200;
  color: #d4d0dc;
  line-height: 1.2;
}

.stat-value.small {
  font-size: 16px;
}

.owner-link {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dotted var(--accent2);
}

.owner-link:hover {
  color: var(--gold);
}

.rep-block {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  margin-top: 8px;
}

.rep-title {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 16px;
}

.rep-title::before {
  content: '//';
  color: var(--gold2);
  margin-right: 6px;
}

.rep-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.rep-org {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}

.rep-org-name {
  color: var(--text);
  min-width: 70px;
}

.rep-org-value {
  display: flex;
  align-items: center;
  gap: 4px;
}

.white-circle {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: transparent;
  border: 1.5px solid #b8b4c0;
}

.yellow-circle {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #c4a86e;
  border: 1.5px solid #6e5a30;
}

.rep-number {
  color: var(--dim);
  font-size: 10px;
}

.rep-number.gold {
  color: var(--gold);
}

.dop-status {
  margin-top: 16px;
  font-size: 11px;
  color: var(--dim);
  border-left: 1px solid var(--border2);
  padding-left: 14px;
}

.dop-status span {
  color: var(--accent);
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 40px 0 16px;
}

.section-header h2 {
  font-family: var(--display);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-num {
  font-size: 9px;
  color: var(--border2);
  letter-spacing: 0.1em;
}

.inventory-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

@media (max-width: 600px) {
  .inventory-grid { grid-template-columns: 1fr; }
}

.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.item-card:hover {
  border-color: var(--border2);
}

.item-card.accent {
  border-left: 2px solid var(--accent2);
}

.item-card.gold {
  border-left: 2px solid var(--gold2);
}

.item-card.warn {
  border-left: 2px solid var(--warn2);
}

.item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.item-name {
  font-size: 14px;
  font-weight: 400;
  color: #d4d0dc;
  letter-spacing: 0.02em;
}

.item-quantity {
  font-size: 12px;
  color: var(--accent);
  background: rgba(126,184,164,0.1);
  border: 1px solid var(--accent2);
  padding: 2px 8px;
  border-radius: 2px;
}

.item-type {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.item-desc {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
}

.terminal {
  background: #060607;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  overflow: hidden;
  margin: 24px 0 16px;
}

.t-bar {
  background: #0d0d0f;
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dot { width: 8px; height: 8px; border-radius: 50%; }
.dr { background: #2e1616; }
.dy { background: #2e2516; }
.dg { background: #162e1e; }

.t-title {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.12em;
  margin-left: 6px;
}

.t-body { padding: 16px 20px; }

.line { display: block; margin-bottom: 2px; }
.c-sys  { color: #4a7a8a; }
.c-dim  { color: var(--dim); }
.c-warn { color: var(--warn); }

.badge {
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 2px;
}

.badge-ai { color: var(--accent); background: rgba(126,184,164,0.1); border: 1px solid var(--accent2); }
.badge-act { color: var(--gold); background: rgba(196,168,110,0.1); border: 1px solid var(--gold2); }

.stat-label {
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dim);
  display: block;
  margin-bottom: 3px;
}

.admin-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  color: var(--dim);
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 0.1em;
  z-index: 1001;
  transition: all 0.2s;
}

.admin-btn:hover {
  border-color: var(--accent2);
  color: var(--accent);
}

.footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <a href="index.html" class="back-link">
      <span>←</span> К АНКЕТЕ
    </a>
    
    <div class="header-sys">
      <span class="status-dot"></span>
      инвентарный архив // frodller_registry // доступ: открыт
    </div>
    
    <div class="title-block">
      <h1><span>//</span> ИНВЕНТАРЬ</h1>
      <div style="font-size: 11px; color: var(--dim);">Деламейн // состояние на тек. момент</div>
    </div>
  </div>

  <div id="inventory-content"></div>

  <div class="footer">
    <span>DEL // ИНВЕНТАРНАЯ ОПИСЬ v1.2</span>
    <span>фродллер // обновление: <span id="update-date"></span></span>
  </div>

</div>

<a href="admin.html" class="admin-btn">⚙️ ADMIN</a>

<script>
async function loadInventoryData() {
  try {
    const response = await fetch('data_character.json?' + Date.now());
    const data = await response.json();
    
    document.getElementById('update-date').textContent = data.last_updated || '12.03.2026';
    
    document.getElementById('inventory-content').innerHTML = `
      <div class="stats-card">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">Владелец</div>
            <div class="stat-value small">
              <a href="index.html" class="owner-link">${data.owner}</a>
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Псевдоним</div>
            <div class="stat-value small">${data.nickname}</div>
            <div style="font-size: 9px; color: var(--dim); margin-top: 4px;">${data.nickname_note}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Специальность</div>
            <div class="stat-value small">${data.specialty}</div>
            <div style="font-size: 9px; color: var(--dim); margin-top: 4px;">${data.specialty_note}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Кредиты</div>
            <div class="stat-value">${data.credits.toLocaleString()}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">ОО</div>
            <div class="stat-value">${data.oo}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">ОС</div>
            <div class="stat-value">${data.os}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Глобальная репутация</div>
            <div class="stat-value small">${data.reputation.global}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Доп. статус</div>
            <div class="stat-value small">${data.extra_status || '—'}</div>
          </div>
        </div>

        <div class="rep-block">
          <div class="rep-title">Репутация организаций</div>
          <div class="rep-grid">
            ${Object.entries(data.reputation.organizations).map(([org, value]) => `
              <div class="rep-org">
                <span class="rep-org-name">${org}</span>
                <div class="rep-org-value">
                  <span class="${value < 0 ? 'yellow-circle' : 'white-circle'}"></span>
                  <span class="rep-number ${value < 0 ? 'gold' : ''}">(${value})</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="dop-status">
          <span>//</span> Дополнительный статус: ${data.extra_status || 'отсутствует'}
        </div>
      </div>

      <div class="terminal">
        <div class="t-bar">
          <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
          <div class="t-title">СИСТЕМА УЧЁТА // АКТИВНО</div>
        </div>
        <div class="t-body">
          <span class="line c-sys">[СИСТЕМА] Загружен реестр материальных активов</span>
          <span class="line c-dim">[СТАТУС] Автопарк: ${data.inventory.autopark}/10 ед. в рабочем состоянии</span>
          <span class="line c-dim">[СТАТУС] Серверная: защита ${data.inventory.security}%</span>
          <span class="line c-sys">[ПОСЛЕДНЕЕ ОБНОВЛЕНИЕ] ${data.last_updated || '12.03.2026'} ${data.last_updated_time || '04:17:22'}</span>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">01</span>
        <h2>Автопарк</h2>
      </div>

      <div class="inventory-grid">
        <div class="item-card accent">
          <div class="item-header">
            <div class="item-name">Единицы автопарка</div>
            <div class="item-quantity">${data.inventory.autopark}</div>
          </div>
          <div class="item-type">транспорт</div>
          <div class="item-desc">${data.inventory.autopark_desc}</div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">02</span>
        <h2>Содержимое</h2>
      </div>

      <div id="inventoryItemsContainer" class="inventory-grid">
        ${data.inventory.items && data.inventory.items.length > 0 
          ? data.inventory.items.map(item => `
              <div class="item-card accent">
                <div class="item-header">
                  <div class="item-name">${item.name}</div>
                  <div class="item-quantity">${item.quantity}</div>
                </div>
                <div class="item-type">предмет</div>
                <div class="item-desc">${item.description}</div>
              </div>
            `).join('')
          : '<div class="item-card"><div class="item-desc">Пусто</div></div>'
        }
      </div>

      <div class="section-header">
        <span class="section-num">03</span>
        <h2>Спутник</h2>
      </div>

      <div id="sputnikContainer" class="card gold-left">
        <div style="display: flex; flex-direction: column; gap: 20px;">
          <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <img src="${data.sputnik.image}" alt="sputnik" style="width: ${data.sputnik.image_size || 300}px; height: ${data.sputnik.image_size || 300}px; object-fit: contain; image-rendering: pixelated; border: 1px solid var(--border2); padding: 10px; background: var(--surface);" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'${data.sputnik.image_size || 300}\' height=\'${data.sputnik.image_size || 300}\' viewBox=\'0 0 300 300\'><rect width=\'300\' height=\'300\' fill=\'%233d6e60\'/><circle cx=\'150\' cy=\'150\' r=\'80\' fill=\'%237eb8a4\'/><text x=\'150\' y=\'180\' text-anchor=\'middle\' fill=\'%2309090a\' font-size=\'60\' font-family=\'monospace\'>S</text></svg>'">
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                <span style="font-size: 22px; color: #d4d0dc; font-family: var(--display);">${data.sputnik.name}</span>
                <span class="badge badge-ai" style="font-size: 10px; padding: 4px 10px;">${data.sputnik.type}</span>
                <span class="badge badge-act" style="font-size: 10px; padding: 4px 10px;">${data.sputnik.status}</span>
              </div>
              <div style="color: var(--text); font-size: 13px; line-height: 1.8;">${data.sputnik.description}</div>
            </div>
          </div>
          
          <div>
            <span class="stat-label" style="font-size: 9px;">Особенности</span>
            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
              ${(data.sputnik.features || []).map(f => `<span class="badge badge-ai" style="font-size: 10px; padding: 4px 10px;">${f}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="terminal" style="margin-top: 32px;">
        <div class="t-bar">
          <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
          <div class="t-title">АРХИВ ЗАПИСЕЙ</div>
        </div>
        <div class="t-body">
          <span class="line c-sys">[АРХИВ] Общее количество записей: ${data.inventory.archive_records.toLocaleString()}</span>
          <span class="line c-dim">├─ поездки: ${data.inventory.trips.toLocaleString()}</span>
          <span class="line c-dim">├─ разговоры: ${data.inventory.conversations.toLocaleString()}</span>
          <span class="line c-dim">├─ внутренние логи: ${data.inventory.logs.toLocaleString()}</span>
          <span class="line c-sys">[АРХИВ] Объём: ${data.inventory.archive_size} // свободно: ${data.inventory.archive_free}</span>
          <span class="line c-dim">[ПРИОРИТЕТНЫЕ] ${data.inventory.priority_logs.join(', ')}</span>
        </div>
      </div>

      <div class="terminal" style="margin-top: 32px;">
        <div class="t-bar">
          <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
          <div class="t-title">ПРИМЕЧАНИЕ</div>
        </div>
        <div class="t-body">
          <span class="line c-dim">${data.inventory.note}</span>
          <span class="line c-sys">Система учёта: стабильна.</span>
        </div>
      </div>
    `;
  } catch (error) {
    console.error('Ошибка загрузки инвентаря:', error);
  }
}

loadInventoryData();
</script>
</body>
</html>
