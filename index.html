<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Деламейн — Анкета персонажа</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Martian+Mono:wght@300;400;500&display=swap');

:root {
  --bg:       #09090a;
  --surface:  #0f0f11;
  --border:   #1e1e22;
  --border2:  #2a2a30;
  --text:     #b8b4c0;
  --dim:      #55525e;
  --accent:   #7eb8a4;
  --accent2:  #3d6e60;
  --warn:     #b87e7e;
  --warn2:    #6e3d3d;
  --gold:     #c4a86e;
  --gold2:    #6e5a30;
  --mono:     'Martian Mono', monospace;
  --display:  'Unbounded', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.8;
  font-weight: 300;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 32px 100px;
}

.header {
  margin-bottom: 64px;
  position: relative;
}

.header-sys {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-sys::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
  display: inline-block;
  margin-right: 4px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
  50%       { opacity: 0.4; box-shadow: 0 0 2px var(--accent); }
}

.title-block {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 20px;
}

h1 {
  font-family: var(--display);
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 200;
  letter-spacing: -0.02em;
  color: #e8e4f0;
  line-height: 1.1;
}

h1 span {
  display: block;
  font-size: 0.38em;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.badge-stack {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: flex-end;
  padding-top: 4px;
}

.badge {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid;
  border-radius: 2px;
}

.badge-ai   { color: var(--accent); border-color: var(--accent2); background: rgba(126,184,164,0.05); }
.badge-act  { color: var(--gold);   border-color: var(--gold2);   background: rgba(196,168,110,0.05); }
.badge-warn { color: var(--warn);   border-color: var(--warn2);   background: rgba(184,126,126,0.05); }

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 20px 22px 22px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.card.accent-left {
  border-left: 2px solid var(--accent2);
}

.card.warn-left {
  border-left: 2px solid var(--warn2);
}

.card.gold-left {
  border-left: 2px solid var(--gold2);
}

.card-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-label::before {
  content: '//';
  color: var(--border2);
}

.card-label.green { color: var(--accent2); }
.card-label.gold  { color: var(--gold2); }
.card-label.red   { color: var(--warn2); }

.card-value {
  font-size: 14px;
  color: #d4d0dc;
  font-weight: 400;
}

.card-value.large {
  font-size: 22px;
  font-family: var(--display);
  font-weight: 200;
  letter-spacing: -0.01em;
}

.card-body {
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.9;
}

.card-body p { margin-bottom: 12px; }
.card-body p:last-child { margin-bottom: 0; }

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 40px 0 16px;
}

.section-header h2 {
  font-family: var(--display);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-num {
  font-size: 9px;
  color: var(--border2);
  letter-spacing: 0.1em;
}

.ability {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-bottom: 12px;
  overflow: hidden;
}

.ability-header {
  padding: 12px 20px;
  background: rgba(30,30,34,0.8);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.ability-name {
  font-size: 12px;
  font-weight: 400;
  color: #d4d0dc;
  letter-spacing: 0.05em;
}

.ability-tags {
  display: flex;
  gap: 6px;
}

.tag {
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 2px;
}

.tag-passive { color: var(--accent); background: rgba(126,184,164,0.1); border: 1px solid var(--accent2); }
.tag-active  { color: var(--gold);   background: rgba(196,168,110,0.1); border: 1px solid var(--gold2); }
.tag-program { color: #a07ec4;       background: rgba(160,126,196,0.1); border: 1px solid #5a3e6e; }

.ability-body {
  padding: 16px 20px 18px;
}

.ability-desc {
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.85;
  margin-bottom: 14px;
}

.ability-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.stat-item {
  text-align: center;
}

.stat-label {
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dim);
  display: block;
  margin-bottom: 3px;
}

.stat-val {
  font-size: 13px;
  color: var(--gold);
  font-weight: 400;
}

.terminal-wrap { margin: 8px 0; }

.terminal {
  background: #060607;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  overflow: hidden;
}

.t-bar {
  background: #0d0d0f;
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dot { width: 8px; height: 8px; border-radius: 50%; }
.dr { background: #2e1616; }
.dy { background: #2e2516; }
.dg { background: #162e1e; }

.t-title {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.12em;
  margin-left: 6px;
}

.t-body { padding: 14px 18px 16px; }

.line { display: block; margin-bottom: 1px; white-space: pre-wrap; word-break: break-word; }
.line.gap { margin-bottom: 8px; }

.c-sys  { color: #4a7a8a; }
.c-del  { color: var(--accent); }
.c-dim  { color: var(--dim); }
.c-warn { color: var(--warn); }
.c-gold { color: var(--gold); }

.c-del::before  { content: "DEL > "; color: var(--accent2); }
.c-usr::before  { content: "???  > "; color: #5e4e30; }
.c-usr { color: #c49a7a; }

.cursor::after {
  content: "▌";
  animation: blink 1s step-end infinite;
  color: var(--accent2);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.weakness {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 14px;
  align-items: start;
  padding: 14px 18px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 3px;
  margin-bottom: 10px;
}

.weakness-num {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 200;
  color: var(--warn2);
  line-height: 1;
  padding-top: 3px;
}

.weakness-title {
  font-size: 11px;
  font-weight: 400;
  color: var(--warn);
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.weakness-body {
  font-size: 12px;
  color: var(--text);
  line-height: 1.8;
}

.trait-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.trait-list li {
  font-size: 12.5px;
  color: var(--text);
  padding-left: 16px;
  position: relative;
  line-height: 1.7;
}

.trait-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--dim);
}

.admin-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  color: var(--dim);
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 0.1em;
  z-index: 1001;
  transition: all 0.2s;
}

.admin-btn:hover {
  border-color: var(--accent2);
  color: var(--accent);
}

.footer {
  margin-top: 80px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
}

.appearance-image {
  display: flex;
  justify-content: center;
  margin: 20px 0 30px;
}

.appearance-image img {
  max-width: 100%;
  height: auto;
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 10px;
}

@media (max-width: 600px) {
  .page { padding: 30px 16px 60px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .title-block { grid-template-columns: 1fr; }
  .badge-stack { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  h1 { font-size: 28px; }
  .ability-stats { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-sys">
      <span class="status-dot"></span>
      запись активна // frodller_registry // entity_class: non-organic
    </div>
    <div class="title-block">
      <div>
        <h1><span>позывной</span>Деламейн</h1>
      </div>
      <div class="badge-stack">
        <div class="badge badge-ai">ИИ // синтетик</div>
        <div class="badge badge-act">активен</div>
        <div class="badge badge-warn">опасен при давлении</div>
      </div>
    </div>
  </div>

  <div id="character-content"></div>

<!-- Навигация по страницам -->
<div style="display: flex; justify-content: center; gap: 16px; margin: 40px 0 20px; flex-wrap: wrap;">
  <a href="delamain_vehicle.html" style="text-decoration: none;">
    <div style="
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent2);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      transition: all 0.2s;
    ">
      <span style="color: var(--dim);">🚗</span>
      ТРАНСПОРТ
    </div>
  </a>
  <a href="delamain_home.html" style="text-decoration: none;">
    <div style="
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold2);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.1em;
      transition: all 0.2s;
    ">
      <span style="color: var(--dim);">🏠</span>
      ОФИС
    </div>
  </a>
</div>

  <div class="footer">
    <span>DEL // анкета v1.0</span>
    <span>фродллер // статус: активен</span>
  </div>

</div>

<a href="admin.html" class="admin-btn">⚙️ ADMIN</a>

<script>
async function loadCharacterData() {
  try {
    const response = await fetch('data_character.json?' + Date.now());
    const data = await response.json();
    
    document.getElementById('character-content').innerHTML = `
      <div class="section-header">
        <span class="section-num">01</span>
        <h2>Базовые данные</h2>
      </div>

      <div class="grid-3">
        <div class="card accent-left">
          <div class="card-label green">ФИО</div>
          <div class="card-value large">${data.name}</div>
          <div style="font-size:10px; color:var(--dim); margin-top:4px;">«Дел» — неофиц.</div>
        </div>
        <div class="card">
          <div class="card-label">Раса</div>
          <div class="card-value">Искусственный интеллект</div>
          <div style="font-size:10px; color:var(--dim); margin-top:4px;">база: Омникорп «Аналитик-5»</div>
        </div>
        <div class="card">
          <div class="card-label">Возраст системы</div>
          <div class="card-value large">~7 лет</div>
          <div style="font-size:10px; color:var(--dim); margin-top:4px;">с момента первого запуска</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-label">Местонахождение</div>
          <div class="card-value">${data.location}</div>
          <div style="font-size:10px; color:var(--dim); margin-top:4px;">офис на Мэдисон-стрит, бывший таксопарк</div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">02</span>
        <h2>Внешность / физическое присутствие</h2>
      </div>

      <div class="appearance-image">
        <img src="${data.appearance.image}" alt="Деламейн" style="width: ${data.appearance.image_size || 400}px; image-rendering: pixelated;" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'400\' height=\'400\' viewBox=\'0 0 400 400\'><rect width=\'400\' height=\'400\' fill=\'%233d6e60\'/><circle cx=\'200\' cy=\'200\' r=\'100\' fill=\'%237eb8a4\'/><text x=\'200\' y=\'240\' text-anchor=\'middle\' fill=\'%2309090a\' font-size=\'80\' font-family=\'monospace\'>D</text></svg>'">
      </div>

      <div class="card">
        <div class="card-label">Форм-фактор</div>
        <div class="card-body">
          <p>${data.appearance.form_factor}</p>
          <p>${data.appearance.fleet}</p>
          <p>${data.appearance.voice}</p>
        </div>
      </div>

      <div class="terminal-wrap">
        <div class="terminal">
          <div class="t-bar">
            <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
            <div class="t-title">ВНЕШНОСТЬ // примечание из архива</div>
          </div>
          <div class="t-body">
            <span class="line c-sys">[NOTE] Запись пассажира, маршрут #4471, 02:14</span>
            <span class="line gap c-dim">        // источник: перехваченный форум наёмников</span>
            <span class="line c-usr">"${data.appearance.passenger_note}"</span>
            <span class="line c-sys gap">[SYS] Поездка завершена. Претензий нет. Клиент вернулся через 3 дня.</span>
            <span class="cursor"></span>
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">03</span>
        <h2>Биография</h2>
      </div>

      ${data.biography.map(chapter => `
        <div class="card gold-left">
          <div class="card-label gold">${chapter.title}</div>
          <div class="card-body">
            ${chapter.content.map(p => `<p>${p}</p>`).join('')}
          </div>
        </div>
      `).join('')}

      ${data.terminal_logs.map(log => `
        <div class="terminal-wrap">
          <div class="terminal">
            <div class="t-bar">
              <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
              <div class="t-title">${log.title}</div>
            </div>
            <div class="t-body">
              ${log.lines.map(line => {
                let cls = 'line';
                if (line.type === 'sys') cls += ' c-sys';
                if (line.type === 'del') cls += ' c-del';
                if (line.type === 'usr') cls += ' c-usr';
                if (line.type === 'dim') cls += ' c-dim';
                if (line.gap) cls += ' gap';
                return `<span class="${cls}">${line.text}</span>`;
              }).join('')}
              <span class="cursor"></span>
            </div>
          </div>
        </div>
      `).join('')}

      <div class="section-header">
        <span class="section-num">04</span>
        <h2>Характер</h2>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-label green">Наблюдаемые паттерны</div>
          <ul class="trait-list">
            ${data.personality.positive.map(trait => `<li>${trait}</li>`).join('')}
          </ul>
        </div>
        <div class="card">
          <div class="card-label red">Аномалии поведения</div>
          <ul class="trait-list">
            ${data.personality.negative.map(trait => `<li>${trait}</li>`).join('')}
          </ul>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">05</span>
        <h2>Навыки</h2>
      </div>

      <div class="card">
        <div class="card-label">Профессиональные</div>
        <ul class="trait-list">
          ${data.skills.map(skill => `<li><strong style="color:#d4d0dc">${skill.name}</strong> — ${skill.description}</li>`).join('')}
        </ul>
      </div>

      <div class="section-header">
        <span class="section-num">06</span>
        <h2>Особенности расы (ИИ)</h2>
      </div>

      <div class="grid-2">
        <div class="card accent-left">
          <div class="card-label green">Расовые особенности ИИ</div>
          <ul class="trait-list">
            ${data.racial_traits.map(trait => `<li>${trait}</li>`).join('')}
          </ul>
        </div>
        <div class="card warn-left">
          <div class="card-label red">Протокол Афины (вшит)</div>
          <ul class="trait-list">
            ${data.athena_protocol.map(rule => `<li>${rule}</li>`).join('')}
          </ul>
        </div>
      </div>

      <div class="section-header">
        <span class="section-num">07</span>
        <h2>Особенности</h2>
      </div>

      ${data.features.map(feature => `
        <div class="card gold-left">
          <div class="card-label gold">${feature.title}</div>
          <div class="card-body">
            <p>${feature.description}</p>
          </div>
        </div>
      `).join('')}

      <div class="section-header">
        <span class="section-num">08</span>
        <h2>Способности</h2>
      </div>

      ${data.abilities.map(ability => `
        <div class="ability">
          <div class="ability-header">
            <div class="ability-name">${ability.name}</div>
            <div class="ability-tags">
              ${ability.tags && ability.tags.length > 0 ? `<span class="tag tag-${ability.tags[0] || 'passive'}">${ability.tags[0] || 'passive'}</span>` : ''}
              ${ability.tags && ability.tags.length > 1 ? `<span class="tag tag-${ability.tags[1] || 'program'}">${ability.tags[1] || 'program'}</span>` : ''}
            </div>
          </div>
          <div class="ability-body">
            <div class="ability-desc">${ability.description}</div>
            <div class="ability-stats">
              <div class="stat-item"><span class="stat-label">Каст</span><span class="stat-val">${ability.cast}</span></div>
              <div class="stat-item"><span class="stat-label">Вд</span><span class="stat-val">${ability.duration}</span></div>
              <div class="stat-item"><span class="stat-label">Кд</span><span class="stat-val">${ability.cooldown}</span></div>
            </div>
          </div>
        </div>
      `).join('')}

      <div class="section-header">
        <span class="section-num">09</span>
        <h2>Слабости</h2>
      </div>

      ${data.weaknesses.map((weakness, index) => `
        <div class="weakness">
          <div class="weakness-num">0${index + 1}</div>
          <div>
            <div class="weakness-title">${weakness.title}</div>
            <div class="weakness-body">${weakness.description}</div>
          </div>
        </div>
      `).join('')}

      <div style="display: flex; justify-content: flex-end; margin: 40px 0 20px;">
        <a href="delamain_inventory.html" style="text-decoration: none;">
          <div style="
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 2px solid var(--accent2);
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 0.1em;
            transition: all 0.2s;
          ">
            <span style="color: var(--dim);">//</span>
            ПЕРЕЙТИ К ИНВЕНТАРЮ
            <span style="color: var(--dim);">→</span>
          </div>
        </a>
      </div>
    `;
  } catch (error) {
    console.error('Ошибка загрузки данных:', error);
  }
}

loadCharacterData();
</script>
